services:
  # Backend Web Service
  - type: web
    name: automation-tool-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate && gunicorn automater.wsgi:application"
    rootDir: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  # Frontend Web Service using Docker
  - type: web
    name: automation-tool-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile # This will be relative to dockerContext!
    plan: free
